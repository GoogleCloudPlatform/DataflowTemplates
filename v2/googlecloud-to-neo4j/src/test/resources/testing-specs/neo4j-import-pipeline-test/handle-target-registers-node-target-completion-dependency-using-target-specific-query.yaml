version: "1"
sources:
  - type: text
    name: inline-source
    format: excel
    header: [field_1, field_2]
    data:
      - ["v1", "v2"]
targets:
  nodes:
    - name: a-node-target
      source: inline-source
      write_mode: merge
      labels: [Entity]
      properties:
        - source_field: field_1
          target_property: id
      schema:
        key_constraints:
          - name: entity_key
            label: Entity
            properties: [id]
