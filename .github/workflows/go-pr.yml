# Checks to run whenever there is a Go PR. Currently, we only write Go code
# for CI/CD purposes, so the jobs tend to lighter-weight than Java PRs
# are.

name: Go PR

on:
  pull_request:
    branches:
      - 'main'
    paths:
      - 'cicd/**'
      - '.github/workflows/go-pr.yml'

permissions:
  contents: read

jobs:
  check_formatting:
    name: Go FMT
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          check-latest: true
      - name: Run Fmt
        run: |
          cd cicd
          if [[ $(go fmt ./...) != "" ]]; then
            echo 'There were formatting violations'
            exit 1
          fi
  build_and_tests:
    name: Build and Test
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.25'
          check-latest: true
      # By nature, this also makes sure that everything builds
      - name: Run Tests
        run: |
          cd cicd
          go test ./...
