name: Enforce labels for release notes
on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]
jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Verify required release notes label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            // Note: If updating these labels, also update .github/release.yml 
            // and contributor-docs/code-contributions.md.
            const pr = context.payload.pull_request;
            if (!pr) return;

            const requiredLabels = [
              'addition',
              'bug-fix',
              'ignore-for-release',
              'improvement',
              'new-template',
              'package-upgrade'
            ];
            const prLabels = (pr.labels || []).map(l => l.name);
            const hasRequiredLabel = prLabels.some(l => requiredLabels.includes(l));

            if (!hasRequiredLabel) {
              core.setFailed("This PR is being prevented from merging because you have not added any of the following labels: [addition, bug-fix, ignore-for-release, improvement, new-template, package-upgrade]. You'll need to add one before this PR can be merged so that these can be used for release notes. For more information, see https://github.com/GoogleCloudPlatform/DataflowTemplates/blob/main/contributor-docs/code-contributions.md#release-notes");
            }
