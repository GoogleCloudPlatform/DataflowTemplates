# Checks that are intended to run on PRs containing Java code.

name: Spanner Load Tests

on:
  schedule:
  # at 02:00 weekly on every Tuesday.
  - cron: '0 2 * * 2'
  workflow_dispatch:
    inputs:
      specific_test:
        description: 'Specific Load Test (passed to -Dtest=)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  load_tests:
    name: Spanner Dataflow Templates Load tests
    timeout-minutes: 2100 # 35 hours
    # Run on any runner that matches all the specified runs-on values.
    runs-on: [ self-hosted, perf ]
    steps:
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Environment
      id: setup-env
      uses: ./.github/actions/setup-env
    - name: Get current date
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
    - name: Run Load Tests
      env:
        SPECIFIC_TEST: ${{ github.event.inputs.specific_test }}
      run: |
        ./cicd/run-load-tests \
        --modules-to-build="SPANNER" \
        --it-region="us-central1" \
        --it-project="cloud-teleport-testing" \
        --it-artifact-bucket="cloud-teleport-testing-it-gitactions" \
        --it-private-connectivity="datastream-connect-2" \
        --lt-export-project="cloud-teleport-testing" \
        --lt-export-dataset="performance_tests" \
        --lt-export-table="template_performance_metrics" \
        --test="$SPECIFIC_TEST"
    - name: Upload Load Tests Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always() # always run even if the previous step fails
      with:
        name: surefire-load-test-results
        path: |
            **/surefire-reports/TEST-*.xml
            **/surefire-reports/*.html
            **/surefire-reports/html/**
        retention-days: 30
    - name: Load Test report on GitHub
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      if: always()
      with:
        name: Load Test report on GitHub
        path: '**/surefire-reports/TEST-*.xml'
        reporter: java-junit
        only-summary: 'true'
        token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-error: 'false'
        list-suites: 'failed'
        list-tests: 'failed'
    - name: Cleanup Java Environment
      uses: ./.github/actions/cleanup-java-env
  observe_load_tests:
    name: Observe Spanner Dataflow Templates Load tests
    needs: [load_tests]
    timeout-minutes: 60
    # Run on any runner that matches all the specified runs-on values.
    runs-on: [ self-hosted, perf ]
    steps:
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Setup Environment
      id: setup-env
      uses: ./.github/actions/setup-env
    - name: Get current date
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
    - name: Run Load Test Observers
      env:
        SPECIFIC_TEST: ${{ github.event.inputs.specific_test }}
      run: |
        ./cicd/run-load-test-observer \
        --modules-to-build="lt/observability" \
        --it-region="us-central1" \
        --it-project="cloud-teleport-testing" \
        --it-artifact-bucket="cloud-teleport-testing-it-gitactions" \
        --lt-export-project="cloud-teleport-testing" \
        --lt-export-dataset="performance_tests" \
        --lt-export-table="template_performance_metrics" \
        --test="$SPECIFIC_TEST"
    - name: Upload Load Test Observer Report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: always() # always run even if the previous step fails
      with:
        name: surefire-observer-test-results
        path: |
          **/surefire-reports/TEST-*.xml
          **/surefire-reports/*.html
          **/surefire-reports/html/**
        retention-days: 1
    - name: Cleanup Java Environment
      uses: ./.github/actions/cleanup-java-env
